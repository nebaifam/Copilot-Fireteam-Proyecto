<article class="team-card">
  <div class="team-card__header">
    <div>
      <h4>{{ team.name }}</h4>
      <p class="team-card__status">{{ team.players }} jugadores</p>
    </div>
    <span class="status-pill">{{ team.status }}</span>
  </div>

  <p class="team-card__description">{{ team.description }}</p>

  <div class="team-card__footer">
    <button class="secondary-button">Ver detalles</button>
  </div>
</article>
